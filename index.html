    function traCuu() {
        const exam = document.getElementById('examType').value;
        const comboIdx = parseInt(document.getElementById('subjectCombo').value);
        const score = parseFloat(document.getElementById('scoreInput').value);
        const errorMsg = document.getElementById('errorMsg');
        const resultBox = document.getElementById('resultBox');
        const finalScoreLabel = document.getElementById('finalScore');

        errorMsg.style.display = 'none';
        resultBox.style.display = 'none';

        // Check validation
        if (isNaN(score)) {
            errorMsg.innerText = "Lỗi: Vui lòng nhập điểm hợp lệ!";
            errorMsg.style.display = 'block';
            return;
        }

        const examData = db[exam];
        let convertedScore = 0;

        // Xử lý QDA và HSA (Truy xuất Dict trực tiếp O(1))
        if (exam === 'QDA' || exam === 'HSA') {
            const minScore = exam === 'QDA' ? 43 : 48;
            const maxScore = exam === 'QDA' ? 126 : 133;

            if (score < minScore || score > maxScore) {
                errorMsg.innerText = `Điểm thi không nằm trong bảng quy đổi (Từ ${minScore} - ${maxScore}).`;
                errorMsg.style.display = 'block';
                return;
            }
            if (!examData[Math.floor(score)]) {
                errorMsg.innerText = "Dữ liệu không khớp hoặc nhập sai định dạng.";
                errorMsg.style.display = 'block';
                return;
            }
            convertedScore = examData[Math.floor(score)][comboIdx];
        } 
        // Xử lý V-ACT (Nội suy tuyến tính chống lỗi dữ liệu)
        else if (exam === 'VACT') {
            if (score < 358 || score > 1139) {
                errorMsg.innerText = "Điểm V-ACT nằm ngoài khung quy đổi (358 - 1139).";
                errorMsg.style.display = 'block';
                return;
            }

            // Nếu khớp chính xác mốc cứng
            if (examData[score]) {
                convertedScore = examData[score][comboIdx];
            } else {
                // Thuật toán nội suy tìm 2 mốc gần nhất (Linear Interpolation)
                const keys = Object.keys(examData).map(Number).sort((a,b) => a - b);
                let lowerBound = keys[0], upperBound = keys[keys.length - 1];

                for (let i = 0; i < keys.length; i++) {
                    if (keys[i] <= score) lowerBound = keys[i];
                    if (keys[i] >= score && upperBound === keys[keys.length - 1]) {
                        upperBound = keys[i];
                        break;
                    }
                }

                const scoreL = examData[lowerBound][comboIdx];
                const scoreU = examData[upperBound][comboIdx];
                
                // Công thức: y = y1 + (x - x1) * ((y2 - y1) / (x2 - x1))
                convertedScore = scoreL + (score - lowerBound) * ((scoreU - scoreL) / (upperBound - lowerBound));
            }
        }

        // Cập nhật DOM
        finalScoreLabel.innerText = convertedScore.toFixed(2);
        resultBox.style.display = 'block';
    }
